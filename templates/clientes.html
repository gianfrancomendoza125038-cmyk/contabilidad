<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #0d1b2a;
        color: white;
        font-family: Arial;
      }

      .container {
        margin-top: 40px;
      }

      .card {
        background: #10243d;
        padding: 25px;
        border-radius: 15px;
        margin-bottom: 30px;
      }

      .table {
        background: white;
        border-radius: 10px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="mb-4">Clientes</h1>

      <div class="mb-3">
        <a href="/dashboard" class="btn btn-secondary"> ← Volver al Menú </a>
      </div>

      <div class="card">
        <form action="/guardar_cliente" method="POST">
          <div class="row">
            <div class="col-md-3">
              <label>Nombre</label>

              <input type="text" class="form-control" name="nombre" />
            </div>

            <div class="col-md-3">
              <label>CI / NIT</label>

              <input type="text" class="form-control" name="ci_nit" />
            </div>

            <div class="col-md-3">
              <label>Teléfono</label>

              <input type="text" class="form-control" name="telefono" />
            </div>

            <div class="col-md-3">
              <label>Dirección</label>

              <input type="text" class="form-control" name="direccion" />
            </div>
          </div>

          <button class="btn btn-primary mt-4">Guardar Cliente</button>
        </form>
      </div>

      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>CI/NIT</th>
            <th>Teléfono</th>
            <th>Dirección</th>
          </tr>
        </thead>

        <tbody>
          {% for cliente in clientes %}

          <tr>
            <td>{{ cliente._id }}</td>
            <td>{{ cliente.nombre }}</td>
            <td>{{ cliente.ci_nit }}</td>
            <td>{{ cliente.telefono }}</td>
            <td>{{ cliente.direccion }}</td>
          </tr>

          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
