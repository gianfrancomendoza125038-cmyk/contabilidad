<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plan de Cuentas</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #0d1b2a;
        color: white;
        font-family: Arial;
      }

      .container {
        margin-top: 40px;
      }

      .card {
        background: #10243d;
        padding: 25px;
        border-radius: 15px;
        margin-bottom: 30px;
      }

      .table {
        background: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="mb-4">Plan de Cuentas</h1>
      <div class="mb-3">
        <a href="/dashboard" class="btn btn-secondary"> ← Volver al Menú </a>
      </div>

      <div class="card">
        <form action="/guardar_cuenta" method="POST">
          <div class="row">
            <div class="col-md-3">
              <label>Código</label>
              <input type="text" class="form-control" name="codigo" />
            </div>

            <div class="col-md-3">
              <label>Nombre Cuenta</label>
              <input type="text" class="form-control" name="nombre" />
            </div>

            <div class="col-md-3">
              <label>Tipo</label>

              <select class="form-control" name="tipo">
                <option>Activo</option>
                <option>Pasivo</option>
                <option>Patrimonio</option>
                <option>Ingreso</option>
                <option>Gasto</option>
              </select>
            </div>

            <div class="col-md-3">
              <label>Naturaleza</label>

              <select class="form-control" name="naturaleza">
                <option>Deudora</option>
                <option>Acreedora</option>
              </select>
            </div>
          </div>

          <button class="btn btn-primary mt-4">Guardar Cuenta</button>
        </form>
      </div>

      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Código</th>
            <th>Cuenta</th>
            <th>Tipo</th>
            <th>Naturaleza</th>
          </tr>
        </thead>

        <tbody>
          {% for cuenta in cuentas %}

          <tr>
            <td>{{ cuenta[0] }}</td>
            <td>{{ cuenta[1] }}</td>
            <td>{{ cuenta[2] }}</td>
            <td>{{ cuenta[3] }}</td>
            <td>{{ cuenta[4] }}</td>
          </tr>

          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
