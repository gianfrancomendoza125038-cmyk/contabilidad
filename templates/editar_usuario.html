<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Usuario</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #0d1b2a;
        color: white;
        font-family: Arial;
      }

      .container {
        margin-top: 50px;
        max-width: 700px;
      }

      .card {
        background: #10243d;
        padding: 30px;
        border-radius: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h2 class="mb-4">Editar Usuario</h2>

        <form action="/actualizar_usuario/{{ usuario._id }}" method="POST">
          <div class="mb-3">
            <label>Nombres</label>
            <input
              type="text"
              class="form-control"
              name="nombres"
              value="{{ usuario.nombres }}"
            />
          </div>

          <div class="mb-3">
            <label>Apellidos</label>
            <input
              type="text"
              class="form-control"
              name="apellidos"
              value="{{ usuario.apellidos }}"
            />
          </div>

          <div class="mb-3">
            <label>Correo</label>
            <input
              type="email"
              class="form-control"
              name="correo"
              value="{{ usuario.correo }}"
            />
          </div>

          <div class="mb-3">
            <label>Usuario</label>
            <input
              type="text"
              class="form-control"
              name="usuario"
              value="{{ usuario.usuario }}"
            />
          </div>

          <div class="mb-3">
            <label>Rol</label>

            <select class="form-control" name="rol">
              <option>{{ usuario.rol }}</option>
              <option>Administrador</option>
              <option>Contador</option>
            </select>
          </div>

          <button class="btn btn-primary">Actualizar Usuario</button>
        </form>
      </div>
    </div>
  </body>
</html>
