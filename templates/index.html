<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login - Sistema Contable</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Poppins", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #07111f, #0d1b2a, #10243d);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .login-container {
        width: 100%;
        max-width: 430px;
      }

      .login-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .logo {
        text-align: center;
        margin-bottom: 25px;
      }

      .logo h1 {
        color: #0051ff;
        font-weight: 700;
      }

      .logo p {
        color: #b0c4de;
        font-size: 14px;
      }

      .form-control {
        background: rgba(255, 255, 255, 0.08);
        border: none;
        color: white;
        height: 50px;
        border-radius: 12px;
      }

      .form-control:focus {
        background: rgba(255, 255, 255, 0.12);
        color: white;
        box-shadow: none;
        border: 1px solid #00b4ff;
      }

      .form-label {
        color: #dce6f2;
      }

      .btn-login {
        background: #00b4ff;
        border: none;
        height: 50px;
        border-radius: 12px;
        font-weight: 600;
        transition: 0.3s;
      }

      .btn-login:hover {
        background: #0095d9;
      }

      .extra-links {
        margin-top: 20px;
        text-align: center;
      }

      .extra-links a {
        color: #8fbce6;
        text-decoration: none;
        font-size: 14px;
      }

      .extra-links a:hover {
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="logo">
          <h1>SISTEMAS CONTABLES GYAM</h1>
          <p>Sistema Contable Empresarial</p>
        </div>

        <form action="/validar_login" method="POST">
          <div class="mb-3">
            <label class="form-label"> USUARIO </label>

            <input
              type="text"
              class="form-control"
              name="usuario"
              placeholder="Ingresa el nombre de usuario"
            />
          </div>

          <div class="mb-4">
            <label class="form-label"> Contraseña </label>

            <<input
              type="password"
              class="form-control"
              name="password"
              placeholder="Ingrese su contraseña"
            />
          </div>

          <button class="btn btn-login w-100">Iniciar Sesión</button>
        </form>

        <div class="extra-links">
          <a href="#">¿Olvidaste tu contraseña?</a>
          <br /><br />

          <a href="/registro"> Registrarse </a>
        </div>
      </div>
    </div>
  </body>
</html>
