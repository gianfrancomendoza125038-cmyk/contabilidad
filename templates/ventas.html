<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ventas</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #0d1b2a;
        color: white;
        font-family: Arial;
      }

      .container {
        margin-top: 40px;
      }

      .card {
        background: #10243d;
        padding: 25px;
        border-radius: 15px;
        margin-bottom: 30px;
      }

      .table {
        background: white;
        border-radius: 10px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="mb-4">Ventas</h1>
      <div class="mb-3">
        <a href="/dashboard" class="btn btn-secondary"> ← Volver al Menú </a>
      </div>

      <div class="card">
        <form action="/guardar_venta" method="POST">
          <div class="row">
            <div class="col-md-3">
              <label>Producto</label>

              <select class="form-control" name="producto">
                {% for producto in productos %}

                <option>{{ producto[2] }}</option>

                {% endfor %}
              </select>
            </div>

            <div class="col-md-3">
              <label>Cantidad</label>

              <input type="number" class="form-control" name="cantidad" />
            </div>

            <div class="col-md-3">
              <label>Precio</label>

              <input
                type="number"
                step="0.01"
                class="form-control"
                name="precio"
              />
            </div>

            <div class="col-md-3">
              <label>Fecha</label>

              <input type="date" class="form-control" name="fecha" />
            </div>
          </div>

          <button class="btn btn-primary mt-4">Registrar Venta</button>
        </form>
      </div>

      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio</th>
            <th>Total</th>
            <th>Fecha</th>
            <th>Factura</th>
          </tr>
        </thead>

        <tbody>
          {% for venta in ventas %}

          <tr>
            <td>{{ venta[0] }}</td>
            <td>{{ venta[1] }}</td>
            <td>{{ venta[2] }}</td>
            <td>{{ venta[3] }}</td>
            <td>{{ venta[4] }}</td>
            <td>{{ venta[5] }}</td>
            <td>
              <a
                href="/factura_pdf/{{ venta[0] }}"
                class="btn btn-danger btn-sm"
              >
                PDF
              </a>
            </td>
          </tr>

          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
