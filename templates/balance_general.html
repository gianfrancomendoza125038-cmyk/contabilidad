<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Balance General</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #0d1b2a;
        color: white;
        font-family: Arial;
      }

      .container {
        margin-top: 40px;
      }

      .card-balance {
        background: #10243d;
        padding: 25px;
        border-radius: 15px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="mb-4">Balance General</h1>

      <div class="mb-3">
        <a href="/dashboard" class="btn btn-secondary"> ← Volver al Menú </a>
      </div>

      <div class="row">
        <div class="col-md-4">
          <div class="card-balance">
            <h3>ACTIVOS</h3>

            <h2>{{ activos }}</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card-balance">
            <h3>PASIVOS</h3>

            <h2>{{ pasivos }}</h2>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card-balance">
            <h3>PATRIMONIO</h3>

            <h2>{{ patrimonio }}</h2>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
