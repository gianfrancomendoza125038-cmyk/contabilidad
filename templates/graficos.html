<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gráficos Financieros</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #0d1b2a;
        color: white;
        font-family: Arial;
      }

      .container {
        margin-top: 40px;
      }

      .card-chart {
        background: #10243d;
        padding: 25px;
        border-radius: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="mb-4">Gráficos Financieros</h1>
      <div class="mb-3">
        <a href="/dashboard" class="btn btn-secondary"> ← Volver al Menú </a>
      </div>

      <div class="card-chart">
        <canvas id="miGrafico"></canvas>
      </div>
    </div>

    <script>

      const ctx = document.getElementById('miGrafico');

      new Chart(ctx, {

          type: 'bar',

          data: {

              labels: ['Ingresos', 'Gastos'],

              datasets: [{

                  label: 'Estado Financiero',

                  data: [{{ ingresos }}, {{ gastos }}],

                  borderWidth: 1

              }]

          },

          options: {

              responsive: true

          }

        });
    </script>
  </body>
</html>
