<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuarios</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #0d1b2a;
        color: white;
        font-family: Arial;
      }

      .container {
        margin-top: 40px;
      }

      .table {
        background: white;
        border-radius: 10px;
        overflow: hidden;
      }

      h1 {
        margin-bottom: 30px;
      }

      .btn {
        margin-right: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Usuarios Registrados</h1>

      <a href="/dashboard" class="btn btn-primary mb-3">
        Volver al Dashboard
      </a>

      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Nombres</th>
            <th>Apellidos</th>
            <th>Correo</th>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody>
          {% for usuario in usuarios %}

          <tr>
            <td>{{ usuario[0] }}</td>
            <td>{{ usuario[1] }}</td>
            <td>{{ usuario[2] }}</td>
            <td>{{ usuario[3] }}</td>
            <td>{{ usuario[5] }}</td>
            <td>{{ usuario[6] }}</td>

            <td>
              <a
                href="/editar_usuario/{{ usuario[0] }}"
                class="btn btn-warning btn-sm"
              >
                Editar
              </a>

              <a
                href="/eliminar_usuario/{{ usuario[0] }}"
                class="btn btn-danger btn-sm"
              >
                Eliminar
              </a>
            </td>
          </tr>

          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
