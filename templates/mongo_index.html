<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - MongoDB Atlas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #4CAF50; }
        form { margin-bottom: 20px; }
        input[type="text"] { padding: 8px; width: 200px; }
        button { padding: 8px 15px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        ul { list-style-type: none; padding: 0; }
        li { background: #f2f2f2; margin: 5px 0; padding: 10px; border-radius: 4px; }
        .back-link { display: inline-block; margin-top: 20px; text-decoration: none; color: #008CBA; }
    </style>
</head>
<body>
    <h1>Usuarios Registrados (MongoDB)</h1>

    <form action="/mongo_guardar" method="POST">
        <input type="text" name="nombre" placeholder="Nombre de usuario" required>
        <button type="submit">Guardar en MongoDB</button>
    </form>

    <h2>Lista de usuarios:</h2>
    <ul>
        {% for usuario in usuarios %}
            <li>{{ usuario.nombre }} (ID: {{ usuario._id }})</li>
        {% else %}
            <li>No hay usuarios registrados en MongoDB aún.</li>
        {% endfor %}
    </ul>

    <a href="/" class="back-link">&larr; Volver al Sistema Principal (MySQL)</a>
</body>
</html>
