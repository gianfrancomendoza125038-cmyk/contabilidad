<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #0d1b2a;
        color: white;
        font-family: Arial;
      }

      .container {
        margin-top: 40px;
      }

      .card {
        background: #10243d;
        padding: 25px;
        border-radius: 15px;
        margin-bottom: 30px;
      }

      .table {
        background: white;
        border-radius: 10px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="mb-4">Inventario</h1>
      <div class="mb-3">
        <a href="/dashboard" class="btn btn-secondary"> ← Volver al Menú </a>
      </div>

      <div class="card">
        <form action="/guardar_producto" method="POST">
          <div class="row">
            <div class="col-md-3">
              <label>Código</label>

              <input type="text" class="form-control" name="codigo" />
            </div>

            <div class="col-md-3">
              <label>Producto</label>

              <input type="text" class="form-control" name="producto" />
            </div>

            <div class="col-md-3">
              <label>Stock</label>

              <input type="number" class="form-control" name="stock" />
            </div>

            <div class="col-md-3">
              <label>Precio</label>

              <input
                type="number"
                step="0.01"
                class="form-control"
                name="precio"
              />
            </div>
          </div>

          <button class="btn btn-primary mt-4">Guardar Producto</button>
        </form>
      </div>

      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Código</th>
            <th>Producto</th>
            <th>Stock</th>
            <th>Precio</th>
          </tr>
        </thead>

        <tbody>
          {% for producto in productos %}

          <tr>
            <td>{{ producto._id }}</td>
            <td>{{ producto.codigo }}</td>
            <td>{{ producto.producto }}</td>
            <td>{{ producto.stock }}</td>
            <td>{{ producto.precio }}</td>
          </tr>

          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
